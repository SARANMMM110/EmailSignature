# Live host: /etc/nginx/sites-enabled/emailsignature
# Compare with: diff deploy/emailsignature.nginx.conf /etc/nginx/sites-enabled/emailsignature
#
# Required for POST /api/generate-signature (large HTML body + Puppeteer 30–90s).

upstream signaturestudio_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name signaturestudio.biz;

    root /var/www/EmailSignature/client/dist;
    index index.html;

    client_max_body_size 5m;

    # ssl_certificate     /etc/letsencrypt/live/signaturestudio.biz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/signaturestudio.biz/privkey.pem;

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
        # Full URI /api/... — no trailing slash on proxy_pass URL.
        proxy_pass http://signaturestudio_api;
    }

    location /signatures/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://signaturestudio_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
