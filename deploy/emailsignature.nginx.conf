# Live host: /etc/nginx/sites-enabled/emailsignature
#
# Install / diff:
#   diff deploy/emailsignature.nginx.conf /etc/nginx/sites-enabled/emailsignature
#   sudo nginx -t && sudo systemctl reload nginx
#
# If browser gets HTML "500 Internal Server Error" from nginx/1.18.0 and PM2 shows nothing,
# nginx/WAF blocked the request before Node — check:
#   sudo tail -50 /var/log/nginx/error.log

upstream signaturestudio_api {
    server 127.0.0.1:3001;
    keepalive 8;
}

server {
    listen 443 ssl http2;
    server_name signaturestudio.biz;

    root /var/www/EmailSignature/client/dist;
    index index.html;

    client_max_body_size 5m;

    # ssl_certificate     /etc/letsencrypt/live/signaturestudio.biz/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/signaturestudio.biz/privkey.pem;

    # PNG export: large HTML POST + Puppeteer (30–90s). Exact match MUST come before location /api/.
    location = /api/generate-signature {
        client_max_body_size 5m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_request_buffering off;

        # ModSecurity: uncomment if HTML/text bodies still get nginx HTML 500:
        # modsecurity off;

        proxy_pass http://signaturestudio_api;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 30s;
        proxy_pass http://signaturestudio_api;
    }

    location /signatures/ {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_pass http://signaturestudio_api;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
