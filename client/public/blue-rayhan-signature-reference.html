<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Signature — Blue Rayhan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --lime: #7dc242;
      --lime-bright: #8dc63f;
      --lime-badge: #6db33f;
      --ink: #000000;
      --contact: #000000;
      --muted: #aaaaaa;
      --border: #e0e0e0;
      --rail-border: #ebebeb;
      --card-max: 600px;
      --font: "Montserrat", "Poppins", "Roboto", Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px 16px;
      font-family: var(--font);
      background: #f0f0f0;
      -webkit-font-smoothing: antialiased;
    }

    .email-signature-root {
      max-width: var(--card-max);
      margin: 0 auto;
    }

    .email-signature-card {
      display: flex;
      position: relative;
      width: 100%;
      max-width: var(--card-max);
      min-height: 172px;
      background: #ffffff;
      border: 1px solid var(--border);
    }

    /* Left vertical rail + slim spine graphic */
    .email-signature-rail {
      flex: 0 0 20px;
      width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid var(--rail-border);
      padding: 10px 0;
    }

    .email-signature-rail svg {
      display: block;
      width: 12px;
      height: 96px;
    }

    /* Top-right header cluster (matches engine deco) */
    .email-signature-header-cluster {
      position: absolute;
      top: 12px;
      right: 16px;
      z-index: 1;
      pointer-events: none;
    }

    .email-signature-header-cluster svg {
      display: block;
      width: 108px;
      height: 36px;
    }

    /* Wave + dots above lime footer */
    .email-signature-footer-band {
      width: 100%;
      max-width: 560px;
      margin: 10px auto 0;
      line-height: 0;
    }

    .email-signature-footer-band svg {
      display: block;
      width: 100%;
      height: 18px;
    }

    /* Main content */
    .email-signature-main {
      flex: 1;
      min-width: 0;
      position: relative;
      padding: 14px 18px 26px 10px;
    }

    /* Top-left lime ticks */
    .email-signature-ticks {
      position: absolute;
      top: 12px;
      left: 18px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      z-index: 1;
    }

    .email-signature-ticks i {
      display: block;
      height: 2px;
      background: var(--lime);
      border-radius: 1px;
    }

    .email-signature-ticks i:nth-child(1) {
      width: 22px;
    }

    .email-signature-ticks i:nth-child(2) {
      width: 18px;
    }

    .email-signature-ticks i:nth-child(3) {
      width: 14px;
    }

    /* Three columns */
    .email-signature-columns {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 26px;
      padding-top: 28px;
      padding-left: 2px;
    }

    .email-signature-photo-col {
      flex: 0 0 126px;
      width: 126px;
      display: flex;
      justify-content: center;
      align-items: center;
      align-self: center;
    }

    /* Photo + badge */
    .email-signature-photo-wrap {
      position: relative;
      flex: 0 0 auto;
      margin: 0;
    }

    .email-signature-photo {
      position: relative;
      z-index: 1;
      width: 80px;
      height: 80px;
      border: 2px solid var(--lime-bright);
      overflow: hidden;
      background: #d4d4d4;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .email-signature-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(100%);
    }

    .email-signature-badge {
      position: absolute;
      right: -8px;
      bottom: -8px;
      left: auto;
      top: auto;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 4;
    }

    .email-signature-badge svg {
      width: 50px;
      height: 50px;
      display: block;
    }

    /* Name block */
    .email-signature-name-block {
      flex: 0 1 46%;
      min-width: 0;
      max-width: 248px;
      padding-right: 20px;
      padding-left: 4px;
      border-right: 1px solid var(--border);
      align-self: center;
    }

    .email-signature-name-block .line1 {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--ink);
    }

    .email-signature-name-block .line2 {
      font-size: 22px;
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: var(--lime);
      margin-top: 1px;
    }

    .email-signature-name-rule {
      margin-top: 8px;
      padding-top: 6px;
      border-top: 1px solid #cccccc;
    }

    .email-signature-title-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 6px;
    }

    .email-signature-title-row .title {
      font-size: 11px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: 0.35px;
    }

    .email-signature-title-row .arrow-lime {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--lime);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
    }

    /* Contacts */
    .email-signature-contacts {
      flex: 1 1 54%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding-top: 6px;
      padding-left: 12px;
    }

    .email-signature-contact-row {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 8px;
    }

    .email-signature-contact-row svg {
      flex: 0 0 14px;
      width: 14px;
      height: 14px;
    }

    .email-signature-contact-row span {
      font-size: 11px;
      font-weight: 400;
      color: var(--contact);
      line-height: 1.35;
    }

    /* Bottom lime bar */
    .email-signature-footer {
      width: 100%;
      max-width: var(--card-max);
      height: 12px;
      background: var(--lime);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="email-signature-root">
    <div class="email-signature-card">
      <aside class="email-signature-rail" aria-hidden="true">
        <svg viewBox="0 0 12 96" xmlns="http://www.w3.org/2000/svg" focusable="false">
          <line x1="6" y1="10" x2="6" y2="86" stroke="#e8e8e8" stroke-width="1.15" stroke-linecap="round" />
          <circle cx="6" cy="24" r="2.2" fill="var(--lime)" opacity="0.52" />
          <circle cx="6" cy="50" r="2.6" fill="var(--lime-badge)" opacity="0.48" />
          <circle cx="6" cy="76" r="2.2" fill="var(--lime)" opacity="0.52" />
        </svg>
      </aside>

      <div class="email-signature-main">
        <div class="email-signature-ticks" aria-hidden="true">
          <i></i><i></i><i></i>
        </div>
        <div class="email-signature-header-cluster" aria-hidden="true">
          <svg viewBox="0 0 108 36" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <path
              d="M4 30 Q42 8 104 6"
              stroke="#dfe8d8"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
              opacity="0.75"
            />
            <circle cx="86" cy="11" r="4" fill="var(--lime)" opacity="0.92" />
            <circle cx="100" cy="21" r="2.8" fill="var(--lime-badge)" opacity="0.88" />
            <rect
              x="54"
              y="9"
              width="34"
              height="3.2"
              rx="1.6"
              transform="rotate(-24 71 10.6)"
              fill="var(--lime)"
              opacity="0.4"
            />
            <circle cx="70" cy="26" r="1.9" fill="#b8d99a" opacity="0.78" />
          </svg>
        </div>
        <div class="email-signature-columns">
          <div class="email-signature-photo-col">
          <div class="email-signature-photo-wrap">
            <div class="email-signature-photo">
              <img
                src="https://i.pravatar.cc/320?img=12"
                width="80"
                height="80"
                alt=""
              />
            </div>
            <div class="email-signature-badge" aria-hidden="true">
              <svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg" focusable="false">
                <circle cx="25" cy="25" r="25" fill="var(--lime-badge)" />
                <defs>
                  <path
                    id="sigBadgeCircle"
                    d="M25,25 m-16.5,0 a16.5,16.5 0 1,1 33,0 a16.5,16.5 0 1,1 -33,0"
                  />
                </defs>
                <text
                  fill="#111111"
                  font-family="Montserrat, Poppins, Roboto, Helvetica, Arial, sans-serif"
                  font-size="4.15"
                  font-weight="600"
                  letter-spacing="0.08"
                >
                  <textPath href="#sigBadgeCircle" startOffset="5%">
                    if you need a design • inbox
                  </textPath>
                </text>
                <path
                  fill="none"
                  stroke="#111111"
                  stroke-width="2.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  d="M34.5 34.5L15.5 15.5M15.5 15.5H25.25M15.5 15.5V24.25"
                />
              </svg>
            </div>
          </div>
          </div>

          <div class="email-signature-name-block">
            <div class="line1">Blue</div>
            <div class="line2">Rayhan</div>
            <div class="email-signature-name-rule">
              <div class="email-signature-title-row">
                <span class="title">Graphic Designer</span>
                <span class="arrow-lime" aria-hidden="true">→</span>
              </div>
            </div>
          </div>

          <div class="email-signature-contacts">
            <div class="email-signature-contact-row">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
                <path
                  d="M8 1C5.24 1 3 3.24 3 6c0 3.75 5 9 5 9s5-5.25 5-9c0-2.76-2.24-5-5-5zm0 6.75A1.75 1.75 0 1 1 8 4.25a1.75 1.75 0 0 1 0 3.5z"
                  fill="#7dc242"
                />
              </svg>
              <span>Your Street Address Here</span>
            </div>
            <div class="email-signature-contact-row">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect
                  x="4"
                  y="1"
                  width="8"
                  height="14"
                  rx="2"
                  stroke="#7dc242"
                  stroke-width="1.35"
                  fill="none"
                />
                <circle cx="8" cy="12.5" r="0.85" fill="#7dc242" />
              </svg>
              <span>+10 012 345 6789</span>
            </div>
            <div class="email-signature-contact-row">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <rect
                  x="1"
                  y="3.5"
                  width="14"
                  height="9"
                  rx="1.5"
                  stroke="#7dc242"
                  stroke-width="1.35"
                  fill="none"
                />
                <path
                  d="M1.5 4.5 L8 9.5 L14.5 4.5"
                  stroke="#7dc242"
                  stroke-width="1.35"
                  fill="none"
                />
              </svg>
              <span>yourname@email.com</span>
            </div>
            <div class="email-signature-contact-row">
              <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <circle cx="8" cy="8" r="6.5" stroke="#7dc242" stroke-width="1.35" fill="none" />
                <ellipse cx="8" cy="8" rx="3" ry="6.5" stroke="#7dc242" stroke-width="1.35" fill="none" />
                <line x1="1.5" y1="8" x2="14.5" y2="8" stroke="#7dc242" stroke-width="1.35" />
              </svg>
              <span>www.websitename.com</span>
            </div>
          </div>
        </div>
        <div class="email-signature-footer-band" aria-hidden="true">
          <svg viewBox="0 0 560 18" xmlns="http://www.w3.org/2000/svg" focusable="false">
            <path
              d="M0 10 C112 4 224 15 336 9 C416 5 496 13 560 8"
              fill="none"
              stroke="var(--lime)"
              stroke-width="1.25"
              stroke-linecap="round"
              opacity="0.44"
            />
            <line
              x1="28"
              y1="15.5"
              x2="532"
              y2="15.5"
              stroke="#dedede"
              stroke-width="1"
              stroke-dasharray="3 8"
              opacity="0.95"
            />
            <circle cx="96" cy="9" r="2.1" fill="var(--lime)" opacity="0.48" />
            <circle cx="280" cy="10" r="2" fill="var(--lime-badge)" opacity="0.52" />
            <circle cx="464" cy="9" r="2.1" fill="var(--lime)" opacity="0.48" />
          </svg>
        </div>
      </div>
    </div>
    <div class="email-signature-footer" aria-hidden="true"></div>
  </div>
</body>
</html>
