<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signature live preview</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a222d;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.45;
    }
    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    h1 { font-size: 1.35rem; font-weight: 700; margin: 0 0 8px; }
    .sub { color: var(--muted); font-size: 0.875rem; margin-bottom: 24px; }
    .grid {
      display: grid;
      gap: 24px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 { font-size: 0.95rem; margin: 0 0 14px; font-weight: 600; }
    label {
      display: block;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0d1117;
      color: var(--text);
      margin-bottom: 12px;
      font-size: 0.9rem;
    }
    input:focus {
      outline: none;
      border-color: var(--accent);
    }
    .palettes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    .pal-btn {
      padding: 8px 14px;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
    }
    .pal-btn.active { border-color: #fff; box-shadow: 0 0 0 1px #fff; }
    .pal-blue { background: linear-gradient(135deg, #2563eb, #1d4ed8); }
    .pal-black { background: linear-gradient(135deg, #1e293b, #0f172a); }
    .pal-green { background: linear-gradient(135deg, #059669, #047857); }
    iframe {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fff;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
    button.ghost {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .result-img {
      margin-top: 16px;
      max-width: 100%;
      border-radius: 8px;
      border: 1px solid var(--border);
      display: none;
    }
    .result-img.visible { display: block; }
    .err { color: #f87171; font-size: 0.85rem; margin-top: 8px; }
    .ok { color: #4ade80; font-size: 0.85rem; margin-top: 8px; }
    code { font-size: 0.75rem; color: var(--muted); }
  </style>
</head>
<body>
  <div class="page">
    <h1>Email signature — live preview</h1>
    <p class="sub">Steps 1–3: instant iframe preview · Step 4–5: <code>POST /api/generate-signature</code> (Puppeteer). Serve via Vite dev so <code>/api</code> proxies to the server.</p>

    <div class="grid">
      <div class="card">
        <h2>Palette</h2>
        <div class="palettes" id="palettes"></div>

        <h2>Your details</h2>
        <form id="sigForm">
          <label for="name">Name</label>
          <input id="name" name="name" autocomplete="name" />
          <label for="title">Title</label>
          <input id="title" name="title" />
          <label for="email">Email</label>
          <input id="email" name="email" type="email" />
          <label for="phone">Phone</label>
          <input id="phone" name="phone" />
          <label for="website">Website</label>
          <input id="website" name="website" />
          <label for="company_name">Company</label>
          <input id="company_name" name="company_name" />
          <label for="address_line1">Address line 1</label>
          <input id="address_line1" name="address_line1" />
          <label for="address_line2">Address line 2</label>
          <input id="address_line2" name="address_line2" />
          <label for="photo_url">Photo URL</label>
          <input id="photo_url" name="photo_url" />
          <label for="linkedin">LinkedIn URL</label>
          <input id="linkedin" name="linkedin" />
          <label for="medium">Medium URL</label>
          <input id="medium" name="medium" />
          <label for="twitter">Twitter URL</label>
          <input id="twitter" name="twitter" />
          <label for="github">GitHub URL</label>
          <input id="github" name="github" />
        </form>
      </div>

      <div class="card">
        <h2>Preview (iframe · srcdoc)</h2>
        <iframe id="preview" title="Signature preview" sandbox="allow-same-origin"></iframe>
        <div class="actions">
          <button type="button" class="primary" id="btnDone">Done editing — generate image</button>
          <button type="button" class="ghost" id="btnCopyHtml">Copy HTML</button>
        </div>
        <p id="msg" class="err" style="display:none;"></p>
        <p id="ok" class="ok" style="display:none;"></p>
        <img id="resultImg" class="result-img" alt="Generated signature" />
      </div>
    </div>
  </div>

  <script>
    /* ─── SVG data URIs (white glyphs on transparent — right column) ─── */
    const enc = (svg) => 'data:image/svg+xml,' + encodeURIComponent(svg.replace(/\s+/g, ' ').trim());
    const ICON_EMAIL = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>`);
    const ICON_PHONE = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.52 6.77 19.79 19.79 0 01.44 2.18 2 2 0 012.42.01h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.91a16 16 0 006.06 6.06l.71-.71a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>`);
    const ICON_WEB = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>`);
    const ICON_LOC = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.95)" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>`);

    const ICON_LI = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="#0A66C2" d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.07 2.07 0 01-2.064-2.065A2.07 2.07 0 015.337 3.3a2.068 2.068 0 012.065 2.068 2.068 2.068 0 01-2.065 2.065zm1.782 13.019H3.555V9h3.564v11.452z"/></svg>`);
    const ICON_MD = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="#000" d="M4.37 3.51h4.26l3.43 8.55 3.43-8.55h4.26v16.98h-3.65v-11.2l-3.43 8.55h-.88l-3.43-8.55v11.2H4.37V3.51z"/></svg>`);
    const ICON_TW = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="#1D9BF0" d="M22.46 6c-.77.35-1.6.58-2.46.69.88-.53 1.56-1.37 1.88-2.38-.83.5-1.75.85-2.72 1.05C18.37 4.5 17.26 4 16 4c-2.35 0-4.27 1.92-4.27 4.29 0 .34.04.67.11.98C8.28 9.09 5.11 7.38 3 4.79c-.37.63-.58 1.37-.58 2.15 0 1.49.75 2.81 1.91 3.56-.71 0-1.37-.2-1.95-.5v.03c0 2.08 1.48 3.82 3.44 4.21a4.22 4.22 0 01-1.93.07 4.28 4.28 0 004 2.98 8.521 8.521 0 01-5.33 1.84c-.34 0-.68-.02-1.02-.06C3.44 20.29 5.7 21 8.12 21 16 21 20.33 14.46 20.33 8.79c0-.19 0-.37-.01-.56.84-.6 1.56-1.36 2.14-2.23z"/></svg>`);
    const ICON_GH = enc(`<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"><path fill="#181717" d="M12 2C6.48 2 2 6.58 2 12.25c0 4.54 2.94 8.4 7.02 9.77.51.1.7-.22.7-.5 0-.24-.01-1.03-.01-1.87-2.78.62-3.37-1.2-3.37-1.2-.45-1.18-1.1-1.5-1.1-1.5-.9-.63.07-.62.07-.62 1 .07 1.52 1.05 1.52 1.05.89 1.55 2.34 1.1 2.91.84.09-.66.35-1.1.63-1.35-2.22-.26-4.55-1.14-4.55-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.27 2.75 1.05A9.52 9.52 0 0112 6.8c.85.004 1.71.12 2.51.35 1.91-1.32 2.75-1.05 2.75-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.81 0 .27.18.59.71.49A10.03 10.03 0 0022 12.25C22 6.58 17.52 2 12 2z"/></svg>`);

    const PALETTES = {
      blue: { primary_color: '#2563eb', secondary_color: '#1e40af', id: 'blue' },
      black: { primary_color: '#1e293b', secondary_color: '#0f172a', id: 'black' },
      green: { primary_color: '#059669', secondary_color: '#047857', id: 'green' },
    };

    const TEMPLATE_1 = `<div style="width:600px; height:200px; font-family:Arial, sans-serif; display:flex; border-radius:12px; overflow:hidden; background:#ffffff;">

  <div style="width:50%; background:#f4f4f4; padding:22px 20px; display:flex; flex-direction:column; justify-content:center;">

    <div style="font-size:20px; font-weight:700; color:{{primary_color}}; line-height:1;">
      {{name}}
    </div>

    <div style="font-size:13px; color:#8a8a8a; margin-top:6px;">
      {{title}}
    </div>

    <div style="margin-top:14px; display:flex; gap:10px;">
      <a href="{{linkedin}}"><img src="{{linkedin_icon}}" width="20" style="display:block;border:0;"></a>
      <a href="{{medium}}"><img src="{{medium_icon}}" width="20" style="display:block;border:0;"></a>
      <a href="{{twitter}}"><img src="{{twitter_icon}}" width="20" style="display:block;border:0;"></a>
      <a href="{{github}}"><img src="{{github_icon}}" width="20" style="display:block;border:0;"></a>
    </div>

    <div style="margin-top:16px; font-size:20px; font-weight:700; color:{{primary_color}}; letter-spacing:0.5px;">
      {{company_name}}
    </div>

  </div>

  <div style="width:0; position:relative;">
    <img src="{{photo_url}}"
         alt=""
         style="
           width:120px;
           height:120px;
           border-radius:50%;
           position:absolute;
           top:40px;
           left:-60px;
           border:6px solid #f4f4f4;
           object-fit:cover;
         ">
  </div>

  <div style="
      width:50%;
      padding:22px 22px;
      color:#ffffff;
      display:flex;
      flex-direction:column;
      justify-content:center;
      background: linear-gradient(135deg, {{primary_color}} 0%, {{secondary_color}} 100%);
    ">

    <div style="display:flex; align-items:center; margin-bottom:8px;">
      <img src="{{email_icon}}" width="16" style="margin-right:10px;display:block;border:0;">
      <span style="font-size:13px; letter-spacing:0.2px;">{{email}}</span>
    </div>

    <div style="display:flex; align-items:center; margin-bottom:8px;">
      <img src="{{phone_icon}}" width="16" style="margin-right:10px;display:block;border:0;">
      <span style="font-size:13px;">{{phone}}</span>
    </div>

    <div style="display:flex; align-items:center; margin-bottom:8px;">
      <img src="{{web_icon}}" width="16" style="margin-right:10px;display:block;border:0;">
      <span style="font-size:13px;">{{website}}</span>
    </div>

    <div style="display:flex; align-items:flex-start;">
      <img src="{{location_icon}}" width="16" style="margin-right:10px; margin-top:2px;display:block;border:0;">
      <span style="font-size:13px; line-height:1.4;">
        {{address_line1}}<br>{{address_line2}}
      </span>
    </div>

  </div>

</div>`;

    /**
     * STEP 2 — Replace {{token}} with values from data (no libraries).
     * Unknown tokens become empty string.
     */
    function renderTemplate(template, data) {
      const merged = { ...data };
      let out = String(template);
      out = out.replace(/\{\{(\w+)\}\}/g, (_, key) => {
        if (Object.prototype.hasOwnProperty.call(merged, key)) {
          return String(merged[key] ?? '');
        }
        return '';
      });
      return out;
    }

    function buildData() {
      const form = document.getElementById('sigForm');
      const fd = new FormData(form);
      const palette = PALETTES[state.activePalette];
      return {
        name: fd.get('name') || '',
        title: fd.get('title') || '',
        email: fd.get('email') || '',
        phone: fd.get('phone') || '',
        website: fd.get('website') || '',
        company_name: fd.get('company_name') || '',
        address_line1: fd.get('address_line1') || '',
        address_line2: fd.get('address_line2') || '',
        photo_url: fd.get('photo_url') || '',
        linkedin: fd.get('linkedin') || '#',
        medium: fd.get('medium') || '#',
        twitter: fd.get('twitter') || '#',
        github: fd.get('github') || '#',
        primary_color: palette.primary_color,
        secondary_color: palette.secondary_color,
        email_icon: ICON_EMAIL,
        phone_icon: ICON_PHONE,
        web_icon: ICON_WEB,
        location_icon: ICON_LOC,
        linkedin_icon: ICON_LI,
        medium_icon: ICON_MD,
        twitter_icon: ICON_TW,
        github_icon: ICON_GH,
      };
    }

    function previewHtmlDocument(bodyInner) {
      return `<!DOCTYPE html><html><head><meta charset="utf-8"><style>html,body{margin:0;padding:8px;background:#f1f5f9;}</style></head><body>${bodyInner}</body></html>`;
    }

    let state = { activePalette: 'blue', lastRendered: '' };

    function updatePreview() {
      const data = buildData();
      const html = renderTemplate(TEMPLATE_1, data);
      state.lastRendered = html;
      const iframe = document.getElementById('preview');
      iframe.srcdoc = previewHtmlDocument(html);
    }

    function initPalettes() {
      const wrap = document.getElementById('palettes');
      const labels = { blue: 'Blue', black: 'Black', green: 'Green' };
      Object.keys(PALETTES).forEach((key) => {
        const b = document.createElement('button');
        b.type = 'button';
        b.className = 'pal-btn pal-' + key + (key === state.activePalette ? ' active' : '');
        b.textContent = labels[key];
        b.dataset.palette = key;
        b.addEventListener('click', () => {
          state.activePalette = key;
          wrap.querySelectorAll('.pal-btn').forEach((x) => x.classList.remove('active'));
          b.classList.add('active');
          updatePreview();
        });
        wrap.appendChild(b);
      });
    }

    document.getElementById('sigForm').addEventListener('input', () => updatePreview());
    document.getElementById('sigForm').addEventListener('change', () => updatePreview());

    document.getElementById('btnCopyHtml').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      const ok = document.getElementById('ok');
      msg.style.display = 'none';
      ok.style.display = 'none';
      try {
        await navigator.clipboard.writeText(state.lastRendered);
        ok.textContent = 'HTML copied to clipboard.';
        ok.style.display = 'block';
      } catch {
        msg.textContent = 'Could not copy — select and copy manually from devtools.';
        msg.style.display = 'block';
      }
    });

    document.getElementById('btnDone').addEventListener('click', async () => {
      const btn = document.getElementById('btnDone');
      const msg = document.getElementById('msg');
      const ok = document.getElementById('ok');
      const img = document.getElementById('resultImg');
      msg.style.display = 'none';
      ok.style.display = 'none';
      img.classList.remove('visible');
      btn.disabled = true;
      updatePreview();
      try {
        const res = await fetch('/api/generate-signature', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ html: state.lastRendered }),
        });
        const j = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(j.error || res.statusText);
        img.src = j.url || j.dataUrl || '';
        img.classList.add('visible');
        ok.textContent = 'Image generated. You can right-click the image to save.';
        ok.style.display = 'block';
      } catch (e) {
        msg.textContent =
          String(e.message || e) +
          ' — Is the API running on :3001 with Puppeteer installed? (npm install in /server)';
        msg.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    });

    /* Defaults */
    document.getElementById('name').value = 'James Doe';
    document.getElementById('title').value = 'Software Engineer';
    document.getElementById('email').value = 'james.doe@example.com';
    document.getElementById('phone').value = '+(91) 9865456739';
    document.getElementById('website').value = 'www.example.com';
    document.getElementById('company_name').value = 'Acme Studio';
    document.getElementById('address_line1').value = 'Office 60, Calicut';
    document.getElementById('address_line2').value = 'Kerala, India';
    document.getElementById('photo_url').value = 'https://i.pravatar.cc/240?img=12';
    document.getElementById('linkedin').value = 'https://linkedin.com/in/jamesdoe';
    document.getElementById('medium').value = 'https://medium.com/@jamesdoe';
    document.getElementById('twitter').value = 'https://twitter.com/jamesdoe';
    document.getElementById('github').value = 'https://github.com/jamesdoe';

    initPalettes();
    updatePreview();
  </script>
</body>
</html>
